# Data-layer configuration (mirrors mtf_smc.config.DataConfig defaults).
# The in-sample / out-of-sample wall is enforced structurally by the loader (see docs/SPEC.md §1.3).
symbol: XAUUSD
data_tz: UTC
# D1/W1 session anchor: 'ny_close' (17:00 America/New_York, DST-aware) or 'utc' (calendar day / Monday).
session_anchor: ny_close

# Cache + raw source. raw_data_dir is null until HistData .xlsx are present (set via SMC_DATA_DIR).
data_cache_dir: data_cache
raw_data_dir: null
cache_pickle_name: XAUUSD_M1_UTC_2015_2023.pkl   # seed; rename when 2024-2025 are added

# Half-open windows [start, end), UTC. is end == oos start == the hard slice boundary.
is_start: "2015-01-01"
oos_start: "2023-01-01"     # development never sees rows >= this
oos_end: "2026-01-01"       # locked OOS covers 2023-2025 inclusive

output_dir: output
seed: 7

# Timeframes built by resampling M1 (highest -> lowest); see mtf_smc/timeframes.py.
timeframes: [W1, D1, H4, H1, M15, M5, M1]
